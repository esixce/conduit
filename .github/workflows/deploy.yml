name: Deploy

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release
      - run: cargo build --release -p conduit-setup
      - uses: actions/upload-artifact@v4
        with:
          name: conduit-setup
          path: target/release/conduit-setup
          retention-days: 5

  deploy:
    name: Deploy ${{ matrix.node }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - node: Creator
            host_secret: CREATOR_HOST
            ssh_key_secret: DEPLOY_SSH_KEY
            username: root
            env_file: deploy/envs/creator.env
            service_template: deploy/conduit-node.service
            binary_dir: /root/conduit/target/release
            old_service: conduit-creator
          - node: Buyer
            host_secret: BUYER_HOST
            ssh_key_secret: DEPLOY_SSH_KEY
            username: root
            env_file: deploy/envs/buyer.env
            service_template: deploy/conduit-node.service
            binary_dir: /root/conduit/target/release
            old_service: conduit-buyer
          - node: Seeder
            host_secret: SEEDER_HOST
            ssh_key_secret: SEEDER_SSH_KEY
            username: ubuntu
            env_file: deploy/envs/seeder.env
            service_template: deploy/conduit-node-aws.service
            binary_dir: /home/ubuntu/conduit/target/release
            old_service: conduit-seeder
          - node: Seeder2
            host_secret: REGISTRY_HOST
            ssh_key_secret: DEPLOY_SSH_KEY
            username: root
            env_file: deploy/envs/seeder2.env
            service_template: deploy/conduit-node.service
            binary_dir: /root/conduit/target/release
            old_service: conduit-seeder2
          - node: Advertiser
            host_secret: ADVERTISER_HOST
            ssh_key_secret: DEPLOY_SSH_KEY
            username: root
            env_file: deploy/envs/advertiser.env
            service_template: deploy/conduit-node.service
            binary_dir: /root/conduit/target/release
            old_service: conduit-node
          - node: DsgnDude
            host_secret: DSGNDUDE_HOST
            ssh_key_secret: DEPLOY_SSH_KEY
            username: root
            env_file: deploy/envs/dsgndude.env
            service_template: deploy/conduit-node.service
            binary_dir: /root/conduit/target/release
            old_service: conduit-node
          - node: Peer7
            host_secret: PEER7_HOST
            ssh_key_secret: DEPLOY_SSH_KEY
            username: root
            env_file: deploy/envs/peer7.env
            service_template: deploy/conduit-node.service
            binary_dir: /root/conduit/target/release
            old_service: conduit-node
          - node: Peer8
            host_secret: PEER8_HOST
            ssh_key_secret: DEPLOY_SSH_KEY
            username: root
            env_file: deploy/envs/peer8.env
            service_template: deploy/conduit-node.service
            binary_dir: /root/conduit/target/release
            old_service: conduit-node
          - node: OWK50GA
            host_secret: OWK50GA_HOST
            ssh_key_secret: DEPLOY_SSH_KEY
            username: root
            env_file: deploy/envs/owk50ga.env
            service_template: deploy/conduit-node.service
            binary_dir: /root/conduit/target/release
            old_service: conduit-owk50ga
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: conduit-setup

      - name: Stop service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ matrix.username }}
          key: ${{ secrets[matrix.ssh_key_secret] }}
          script: |
            SUDO="${{ matrix.username != 'root' && 'sudo' || '' }}"
            $SUDO systemctl stop conduit-node || true
            if [ "${{ matrix.old_service }}" != "conduit-node" ]; then
              $SUDO systemctl stop ${{ matrix.old_service }} || true
              $SUDO systemctl disable ${{ matrix.old_service }} || true
            fi

      - name: Upload binary
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ matrix.username }}
          key: ${{ secrets[matrix.ssh_key_secret] }}
          source: conduit-setup
          target: ${{ matrix.binary_dir }}/
          overwrite: true

      - name: Upload service and env files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ matrix.username }}
          key: ${{ secrets[matrix.ssh_key_secret] }}
          source: "${{ matrix.service_template }},${{ matrix.env_file }}"
          target: /tmp/conduit-deploy/
          overwrite: true

      - name: Install and start
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ matrix.username }}
          key: ${{ secrets[matrix.ssh_key_secret] }}
          script: |
            SUDO="${{ matrix.username != 'root' && 'sudo' || '' }}"
            chmod +x ${{ matrix.binary_dir }}/conduit-setup
            $SUDO mkdir -p /etc/conduit
            $SUDO cp /tmp/conduit-deploy/${{ matrix.env_file }} /etc/conduit/node.env
            $SUDO cp /tmp/conduit-deploy/${{ matrix.service_template }} /etc/systemd/system/conduit-node.service
            rm -rf /tmp/conduit-deploy
            $SUDO systemctl daemon-reload
            $SUDO systemctl enable conduit-node
            $SUDO systemctl start conduit-node
            sleep 3
            $SUDO systemctl is-active conduit-node
